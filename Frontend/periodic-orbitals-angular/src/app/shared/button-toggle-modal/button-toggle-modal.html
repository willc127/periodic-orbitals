<section>
  <mat-button-toggle-group
    [hideSingleSelectionIndicator]="hideSingleSelectionIndicator()"
    [value]="checked()"
    (change)="onCheckedChange($event.value)"
  >
    <mat-button-toggle value="propriedades"><span class="mdi mdi-circle-double mdi-24px"></span>Propriedades</mat-button-toggle>
    <mat-button-toggle value="orbitais"><span class="mdi mdi-atom-variant mdi-24px"></span>Orbitais</mat-button-toggle>
    <mat-button-toggle value="espectro"><span class="mdi mdi-reorder-vertical mdi-24px"></span>Espectro</mat-button-toggle>
  </mat-button-toggle-group>
</section>
