<div class="container-graphics">
  <div class="esquerda">
    <app-axis-selector
      [properties]="properties()"
      (plot)="onPlotRequest($event)"
    ></app-axis-selector>
  </div>
  <div class="direita">
    <app-scatter-chart
      *ngIf="plotRequest()"
      [request]="plotRequest()!"
    ></app-scatter-chart>
  </div>
</div>
