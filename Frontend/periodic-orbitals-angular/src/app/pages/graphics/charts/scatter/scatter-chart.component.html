<div class="scatter-chart">
    <!-- Abas (só quando há mais de 1 série Y) -->
    @if (yConfigs().length > 1) {
      <div class="series-tabs" role="tablist" aria-label="Filtrar série">
        @for (tab of tabs(); track tab.id) {
          <button
            class="series-tab"
            role="tab"
            [class.series-tab--active]="activeTab() === tab.id"
            [style.--tab-color]="$any(tab).color ?? null"
            [attr.aria-selected]="activeTab() === tab.id"
            (click)="selectTab(tab.id)"
          >
            @if ($any(tab).color) {
              <span class="tab-dot" [style.background]="$any(tab).color"></span>
            }
            {{ tab.label }}
          </button>
        }
      </div>
    }

    <!-- Toolbar -->
    <div class="chart-toolbar">
      <button
        mat-icon-button
        [class.active]="showLine()"
        (click)="toggleLine()"
        matTooltip="Conectar pontos"
      >
        <mat-icon>show_chart</mat-icon>
      </button>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrapper">
      <canvas
        #chartCanvas
        role="img"
        [attr.aria-label]="
          'Scatter plot de ' +
          xConfig()!.label +
          ' vs ' +
          visibleYConfigs().length +
          ' propriedade(s)'
        "
      >
        Scatter plot de {{ xConfig()!.label }} contra
        {{ visibleYConfigs().length }} propriedade(s) atômicas.
      </canvas>
    </div>
  
</div>
